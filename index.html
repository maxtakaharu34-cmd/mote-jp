<script>
(()=>{
'use strict';
const SHARE_URL='https://maxtakaharu34-cmd.github.io/mote-jp/';
const LEVELS=[
{min:90,lvl:'神レベル',cmts:['街歩いてるだけで告白される','視線を独占する罪な人','モテすぎて事件になるレベル']},
{min:75,lvl:'モテ偏差値高',cmts:['人気者オーラ全開','LINE通知が止まらない','二股要注意']},
{min:60,lvl:'普通にモテる',cmts:['ちゃんとモテるタイプ','安定の人気','油断は禁物']},
{min:45,lvl:'これからモテる',cmts:['磨けば光る原石','内面が魅力的','ジムで開花の予感']},
{min:30,lvl:'たまにモテる',cmts:['知る人ぞ知る隠れ名作','身内ウケ最強','時代を先取りしてる']},
{min:0,lvl:'これから頑張ろう',cmts:['人柄で勝負','まずは自分を好きに','量産より厳選で']}
];
const $=(id)=>document.getElementById(id);
const vid=$('vid'),cv=$('cv'),scan=$('scan'),result=$('result'),wrap=$('wrap');
let stream=null,lastPt=null,lastLvl=null;
async function startCam(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:480,height:640},audio:false});
    vid.srcObject=stream;await vid.play();return true;
  }catch(e){$('err').textContent='カメラ起動失敗: '+e.message;$('err').classList.add('show');return false}
}
async function go(){
  const btn=$('btn-go');
  if(!stream){btn.textContent='📷 起動中…';btn.disabled=true;
    const ok=await startCam();btn.disabled=false;
    if(!ok){btn.textContent='📷 タップで診断';return}
    await new Promise(r=>setTimeout(r,400));
  }
  btn.textContent='🔄 もう一度診断';diagnose();
}
function diagnose(){
  if(!stream)return;
  const w=vid.videoWidth||320,h=vid.videoHeight||240;
  cv.width=w;cv.height=h;
  const ctx=cv.getContext('2d');ctx.drawImage(vid,0,0,w,h);
  const d=ctx.getImageData(Math.floor(w*.3),Math.floor(h*.3),Math.floor(w*.4),Math.floor(h*.4)).data;
  let h1=0x811c9dc5;
  for(let i=0;i<d.length;i+=16){h1^=d[i];h1=Math.imul(h1,16777619)>>>0}
  // weight toward 50-90 for fun
  const raw=h1%101;
  const pt=Math.min(99,Math.max(20,raw));
  const L=LEVELS.find(L=>pt>=L.min);
  const cmt=L.cmts[h1%L.cmts.length];
  scan.classList.remove('go');void scan.offsetWidth;scan.classList.add('go');
  beep(440,.08);setTimeout(()=>beep(660,.08),200);setTimeout(()=>beep(880,.16),400);
  for(let i=0;i<8;i++)setTimeout(()=>spawnHeart(),i*120+500);
  setTimeout(()=>{
    $('pt').textContent=pt;$('lvl').textContent=L.lvl;$('cmt').textContent=cmt;
    result.classList.add('show');lastPt=pt;lastLvl=L.lvl;$('btn-share').disabled=false;fanfare();
  },1500);
}
function spawnHeart(){
  const h=document.createElement('div');h.className='heart';
  h.textContent=['💘','💖','💕','💝','💗'][Math.floor(Math.random()*5)];
  h.style.left=(20+Math.random()*60)+'%';h.style.bottom='10%';
  wrap.appendChild(h);setTimeout(()=>h.remove(),2000);
}
let ac=null;const en=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();if(ac.state==='suspended')ac.resume();return ac};
const beep=(f,d,t='triangle',g=.13)=>{const a=en();const o=a.createOscillator();const gn=a.createGain();o.type=t;o.frequency.value=f;gn.gain.value=g;gn.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);o.connect(gn).connect(a.destination);o.start();o.stop(a.currentTime+d)};
const fanfare=()=>{[523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>beep(f,.18,'triangle',.15),i*100))};
$('btn-go').addEventListener('click',()=>{en();go()});
$('btn-share').addEventListener('click',()=>{
  if(lastPt==null)return;
  const txt=`AIモテ度診断【${lastPt}点 / ${lastLvl}】 #モテ度診断`;
  window.open(`https://x.com/intent/post?text=${encodeURIComponent(txt)}&url=${encodeURIComponent(SHARE_URL)}`,'_blank','noopener,noreferrer');
});
})();
</script>
